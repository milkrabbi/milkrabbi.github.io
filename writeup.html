                    <p>There was a time where the internet was something I used and not something that used me. I used to visit a lot of forums at the time. My go-to ones were a football (soccer) forum, and erowid - for reading trip reports about obscure drugs which I would later share with friends. Life was a lot simpler back then. One of the things that is very different nowadays is how I make decisions. At the time, for a period of several years, I would often bump into someone in real life who would get me excited about an idea I would delve into, or present me with some opportunity (This is how I ended up living in the Golan Heights). I never sought out these interactions or situations, they just happened. These days I find I have been far too calculated in how I live my life. In other words - I used to live by the grace of god, yet lately I've been building stupid plans and stressing about money and the future.</p>
