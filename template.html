<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[Page Title]</title>
    <link rel="stylesheet" href="styles.css" type="text/css">
</head>
<body>
    <div class="theme-picker">
        <button class="theme-picker-btn" onclick="toggleThemePicker()">&#9790;</button>
        <div class="theme-picker-dropdown">
            <div class="theme-swatch" data-theme="saddle" onclick="setTheme('saddle')" title="Saddle"></div>
            <div class="theme-swatch" data-theme="light" onclick="setTheme('light')" title="Light"></div>
            <div class="theme-swatch" data-theme="dark" onclick="setTheme('dark')" title="Dark"></div>
            <div class="theme-swatch" data-theme="ocean" onclick="setTheme('ocean')" title="Ocean"></div>
            <div class="theme-swatch" data-theme="forest" onclick="setTheme('forest')" title="Forest"></div>
            <div class="theme-swatch" data-theme="lavender" onclick="setTheme('lavender')" title="Lavender"></div>
        </div>
    </div>
    <h1>[Main Heading]</h1>
    <p>[Introductory paragraph or link to source]</p>

    <!-- Filtering Buttons -->
    <div class="topics">
        <button onclick="filterItems('all', '.detail-item', '.topics button')" class="active">All</button>
        <!-- Add more buttons here as needed -->
    </div>

    <!-- Content Details -->
    <ul class="stuff">
        <!-- Each item should be structured like this -->
        <li>
            <details class="detail-item [category-class]">
                <summary>[Item Title]</summary>

                <!-- Ingredients or details -->
                <ul>
                    <!-- List items here -->
                </ul>

                <!-- Instructions or additional information -->
                <p>[Instruction or info paragraph 1]</p>
                <p>[Instruction or info paragraph 2]</p>

            </details>
        </li>
    </ul>

    <script src="scripts.js"></script>
</body>
</html>
